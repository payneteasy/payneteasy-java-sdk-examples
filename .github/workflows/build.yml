name: Build Examples

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  discover:
    name: Discover examples
    runs-on: ubuntu-latest
    outputs:
      examples: ${{ steps.find.outputs.examples }}
    steps:
      - uses: actions/checkout@v4

      - id: find
        name: Find example directories
        run: |
          examples=$(find . -maxdepth 2 -name pom.xml -not -path ./pom.xml \
            | sed 's|/pom.xml||;s|^\./||' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "examples=$examples" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.example }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example: ${{ fromJson(needs.discover.outputs.examples) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: |
          cd "${{ matrix.example }}"
          chmod +x mvnw
          ./mvnw -B package
